spring.application.name=user-service
server.port=${PORT:8081}

# ===== MySQL Database Connection =====
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/smartlab_users?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:Rubitha123}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===== JPA / Hibernate =====
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# ===== Register to Eureka =====
eureka.client.service-url.defaultZone=${EUREKA_URL:http://localhost:8761/eureka/}
eureka.instance.prefer-ip-address=true

# ===== JWT Configuration =====
jwt.secret=${JWT_SECRET:ThisIsASecretKeyForSmartLabEquipmentBookingSystemMustBeAtLeast32Bytes}
jwt.expiration=86400000

# ===== Debug logging (helps troubleshoot security) =====
logging.level.org.springframework.security=DEBUG

# ===== Feign uses Apache HttpClient5 (proper PATCH support) =====
spring.cloud.openfeign.httpclient.hc5.enabled=true

# ===== Seed admin user on startup (only created once if missing) =====
admin.seed.email=${ADMIN_EMAIL:admin@smartlab.local}
admin.seed.password=${ADMIN_PASSWORD:Admin123}
admin.seed.fullName=System Administrator
