spring.application.name=api-gateway
server.port=${PORT:8080}

# Register this gateway to the Eureka server
eureka.client.service-url.defaultZone=${EUREKA_URL:http://localhost:8761/eureka/}
eureka.instance.prefer-ip-address=true

# Let the gateway automatically create routes for every service registered in Eureka
spring.cloud.gateway.server.webflux.discovery.locator.enabled=true
spring.cloud.gateway.server.webflux.discovery.locator.lower-case-service-id=true

# Manual routes (clean URLs for the frontend)
spring.cloud.gateway.server.webflux.routes[0].id=user-service
spring.cloud.gateway.server.webflux.routes[0].uri=lb://user-service
spring.cloud.gateway.server.webflux.routes[0].predicates[0]=Path=/api/users/**

spring.cloud.gateway.server.webflux.routes[1].id=equipment-service
spring.cloud.gateway.server.webflux.routes[1].uri=lb://equipment-service
spring.cloud.gateway.server.webflux.routes[1].predicates[0]=Path=/api/equipment/**

spring.cloud.gateway.server.webflux.routes[2].id=booking-service
spring.cloud.gateway.server.webflux.routes[2].uri=lb://booking-service
spring.cloud.gateway.server.webflux.routes[2].predicates[0]=Path=/api/bookings/**

spring.cloud.gateway.server.webflux.routes[3].id=notification-service
spring.cloud.gateway.server.webflux.routes[3].uri=lb://notification-service
spring.cloud.gateway.server.webflux.routes[3].predicates[0]=Path=/api/notifications/**

# CORS handled in Java: see config/CorsConfig.java
