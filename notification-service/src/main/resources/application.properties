spring.application.name=notification-service
server.port=${PORT:8084}

# ============================================================================
# DATABASE CONNECTION
# DEFAULT (production / Railway): Supabase PostgreSQL — env vars override
# LOCAL DEV:
#   Option 1 — keep Supabase: set $env:DB_PASSWORD before mvnw spring-boot:run
#   Option 2 — use local MySQL: comment block (A), uncomment block (B)
# ============================================================================

# --- (A) SUPABASE POSTGRESQL (default) ---
spring.datasource.url=${DB_URL:jdbc:postgresql://aws-1-ap-south-1.pooler.supabase.com:5432/postgres?currentSchema=notifications}
spring.datasource.username=${DB_USERNAME:postgres.kbttqjlrvhsartvxbflh}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.default_schema=${DB_SCHEMA:notifications}

# --- (B) LOCAL MYSQL (uncomment AND comment out block A above to use) ---
#spring.datasource.url=jdbc:mysql://localhost:3306/smartlab_notifications?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
#spring.datasource.username=root
#spring.datasource.password=Rubitha123
#spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
#spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ===== HikariCP pool (small to fit Supabase free-tier 15-conn limit) =====
spring.datasource.hikari.maximum-pool-size=2
spring.datasource.hikari.minimum-idle=1

# ===== JPA / Hibernate (common settings) =====
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ===== Register to Eureka =====
eureka.client.service-url.defaultZone=${EUREKA_URL:http://localhost:8761/eureka/}
eureka.instance.prefer-ip-address=true

# ===== JWT (validated by smartlab-security-commons) =====
jwt.secret=${JWT_SECRET:ThisIsASecretKeyForSmartLabEquipmentBookingSystemMustBeAtLeast32Bytes}
