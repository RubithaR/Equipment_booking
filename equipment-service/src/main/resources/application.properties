spring.application.name=equipment-service
server.port=${PORT:8082}

# ============================================================================
# DATABASE CONNECTION — Supabase PostgreSQL by default; env vars override
# ============================================================================
spring.datasource.url=${DB_URL:jdbc:postgresql://aws-1-ap-south-1.pooler.supabase.com:6543/postgres?currentSchema=equipment&prepareThreshold=0}
spring.datasource.username=${DB_USERNAME:postgres.kbttqjlrvhsartvxbflh}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.default_schema=${DB_SCHEMA:equipment}

# ===== HikariCP pool (small to fit Supabase free-tier 15-conn limit) =====
spring.datasource.hikari.maximum-pool-size=2
spring.datasource.hikari.minimum-idle=1

# ===== JPA / Hibernate (Flyway owns schema, Hibernate validates) =====
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ===== Flyway =====
spring.flyway.enabled=true
spring.flyway.schemas=${DB_SCHEMA:equipment}
spring.flyway.default-schema=${DB_SCHEMA:equipment}
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0

# ===== Register to Eureka =====
eureka.client.service-url.defaultZone=${EUREKA_URL:http://localhost:8761/eureka/}
eureka.instance.prefer-ip-address=true

# ===== Feign uses Apache HttpClient5 (proper PATCH support) =====
spring.cloud.openfeign.httpclient.hc5.enabled=true

# ===== JWT — must use the same secret as user-service =====
jwt.secret=${JWT_SECRET:ThisIsASecretKeyForSmartLabEquipmentBookingSystemMustBeAtLeast32Bytes}

# ===== Debug logging =====
logging.level.org.springframework.security=INFO
