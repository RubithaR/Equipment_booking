spring.application.name=user-service
server.port=${PORT:8081}

# ============================================================================
# DATABASE CONNECTION
# DEFAULT (production / Railway): Supabase PostgreSQL — env vars override
# LOCAL DEV:
#   Option 1 — keep Supabase: set $env:DB_PASSWORD before mvnw spring-boot:run
#   Option 2 — use local MySQL: comment block (A), uncomment block (B)
# ============================================================================

# --- (A) SUPABASE POSTGRESQL (default) ---
spring.datasource.url=${DB_URL:jdbc:postgresql://aws-1-ap-south-1.pooler.supabase.com:6543/postgres?currentSchema=users&prepareThreshold=0}
spring.datasource.username=${DB_USERNAME:postgres.kbttqjlrvhsartvxbflh}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.default_schema=${DB_SCHEMA:users}

# --- (B) LOCAL MYSQL (uncomment AND comment out block A above to use) ---
#spring.datasource.url=jdbc:mysql://localhost:3306/smartlab_users?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
#spring.datasource.username=root
#spring.datasource.password=Rubitha123
#spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
#spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ===== HikariCP pool (small to fit Supabase free-tier 15-conn limit) =====
spring.datasource.hikari.maximum-pool-size=2
spring.datasource.hikari.minimum-idle=1

# ===== JPA / Hibernate (common settings) =====
# Flyway owns the schema; Hibernate only validates entities match.
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ===== Flyway =====
spring.flyway.enabled=true
spring.flyway.schemas=${DB_SCHEMA:users}
spring.flyway.default-schema=${DB_SCHEMA:users}
spring.flyway.locations=classpath:db/migration
# baseline-on-migrate=true lets Flyway adopt an existing schema without failing
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0

# ===== Register to Eureka =====
eureka.client.service-url.defaultZone=${EUREKA_URL:http://localhost:8761/eureka/}
eureka.instance.prefer-ip-address=true

# ===== JWT Configuration =====
jwt.secret=${JWT_SECRET:ThisIsASecretKeyForSmartLabEquipmentBookingSystemMustBeAtLeast32Bytes}
jwt.expiration=86400000

# ===== Debug logging (helps troubleshoot security) =====
logging.level.org.springframework.security=DEBUG

# ===== Feign uses Apache HttpClient5 (proper PATCH support) =====
spring.cloud.openfeign.httpclient.hc5.enabled=true

# ===== Seed Main Admin on startup (only created once if missing) =====
admin.seed.email=${ADMIN_EMAIL:admin@foe.sjp.ac.lk}
admin.seed.password=${ADMIN_PASSWORD:Admin123}
admin.seed.fullName=System Administrator

# ===== Seed Department Admins (one per department, all optional) =====
# Leave email blank to skip seeding that department's admin.
seed.dept-admin.computer.email=${DEPT_ADMIN_COMPUTER_EMAIL:}
seed.dept-admin.computer.password=${DEPT_ADMIN_COMPUTER_PASSWORD:}
seed.dept-admin.electrical.email=${DEPT_ADMIN_ELECTRICAL_EMAIL:}
seed.dept-admin.electrical.password=${DEPT_ADMIN_ELECTRICAL_PASSWORD:}
seed.dept-admin.mechanical.email=${DEPT_ADMIN_MECHANICAL_EMAIL:}
seed.dept-admin.mechanical.password=${DEPT_ADMIN_MECHANICAL_PASSWORD:}
seed.dept-admin.civil.email=${DEPT_ADMIN_CIVIL_EMAIL:}
seed.dept-admin.civil.password=${DEPT_ADMIN_CIVIL_PASSWORD:}
