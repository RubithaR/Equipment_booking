spring.application.name=booking-service
server.port=${PORT:8083}

# ============================================================================
# DATABASE CONNECTION
# DEFAULT (production / Railway): Supabase PostgreSQL — env vars override
# LOCAL DEV:
#   Option 1 — keep Supabase: set $env:DB_PASSWORD before mvnw spring-boot:run
#   Option 2 — use local MySQL: comment block (A), uncomment block (B)
# ============================================================================

# --- (A) SUPABASE POSTGRESQL (default) ---
spring.datasource.url=${DB_URL:jdbc:postgresql://aws-1-ap-south-1.pooler.supabase.com:5432/postgres?currentSchema=bookings}
spring.datasource.username=${DB_USERNAME:postgres.kbttqjlrvhsartvxbflh}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.default_schema=${DB_SCHEMA:bookings}

# --- (B) LOCAL MYSQL (uncomment AND comment out block A above to use) ---
#spring.datasource.url=jdbc:mysql://localhost:3306/smartlab_bookings?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
#spring.datasource.username=root
#spring.datasource.password=Rubitha123
#spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
#spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ===== HikariCP pool (small to fit Supabase free-tier 15-conn limit) =====
spring.datasource.hikari.maximum-pool-size=2
spring.datasource.hikari.minimum-idle=1

# ===== JPA / Hibernate (Flyway owns schema, Hibernate validates) =====
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ===== Flyway =====
spring.flyway.enabled=true
spring.flyway.schemas=${DB_SCHEMA:bookings}
spring.flyway.default-schema=${DB_SCHEMA:bookings}
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0

# ===== Register to Eureka =====
eureka.client.service-url.defaultZone=${EUREKA_URL:http://localhost:8761/eureka/}
eureka.instance.prefer-ip-address=true

# ===== Feign uses Apache HttpClient5 (proper PATCH support) =====
spring.cloud.openfeign.httpclient.hc5.enabled=true

# ===== JWT — must use the same secret as user-service =====
jwt.secret=${JWT_SECRET:ThisIsASecretKeyForSmartLabEquipmentBookingSystemMustBeAtLeast32Bytes}

# ===== Debug logging =====
logging.level.org.springframework.security=INFO
